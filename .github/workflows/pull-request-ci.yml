name: Pull Request CI

on:
  pull_request:
  workflow_dispatch:

jobs:
  pre-commit-integration:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install pre-commit
        run: python3 -m pip install pre-commit

      - name: Verify pre-commit hook developer workflow
        run: |
          set -euxo pipefail

          SAMPLE_REPO="$RUNNER_TEMP/pre-commit-sample"
          rm -rf "$SAMPLE_REPO"
          mkdir -p "$SAMPLE_REPO"
          cd "$SAMPLE_REPO"

          git init

          cat > .pre-commit-config.yaml <<EOF
          repos:
            - repo: $GITHUB_WORKSPACE
              rev: $GITHUB_SHA
              hooks:
                - id: fix-non-ascii
          EOF

          printf 'int m = 2 × 3;\n' > sample.c
          git add .

          # First run should apply fixes and return non-zero.
          if pre-commit run --all-files --verbose; then
            echo "Expected pre-commit to fail after applying fixes"
            exit 1
          fi

          grep -Fx 'int m = 2 x 3;' sample.c

          # Second run should be clean.
          pre-commit run --all-files --verbose
